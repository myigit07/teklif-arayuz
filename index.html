  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

y:flex;justify-content:space-between;align-items:flex-start;\">\n        <div style=\"display: flex; gap: 16px; align-items: center; position: static\">\n          <sc-if value=\"{{ showSwatches }}\" hint-placeholder-val=\"{{ true }}\">\n            <img src=\"22ca0934-a3e1-4bec-803f-49a78d7843d2\" alt=\"23---kopya\" style=\"max-width: 100%; height: 34px; display: block; object-fit: cover; width: 86px; position: static\">\n          <\u002Fsc-if>\n          <div>\n            <div style=\"font-size:21px;font-weight:700;letter-spacing:.03em;color:#191815;line-height:1.05;\">SELÇUKLU GÖÇER<\u002Fdiv>\n            <div style=\"font-size:21px;font-weight:700;letter-spacing:.22em;color:#1f3a5f;line-height:1.05;\">BOYA<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;color:#7a766e;margin-top:7px;text-transform:uppercase;\">Boya &amp; Cephe Uygulama<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:right;\">\n          <div style=\"font-family: 'IBM Plex Mono',monospace; font-size: 11px; letter-spacing: .3em; color: #7a766e; font-weight: 800\">FİYAT TEKLİF<\u002Fdiv>\n          <div style=\"font-size:34px;font-weight:700;color:#1f3a5f;letter-spacing:.02em;line-height:1;margin-top:2px;\">FORMU<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- INFO CARDS -->\n      <div class=\"info2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:34px;\">\n        <div style=\"border: 1px solid #e6e2da; border-radius: 7px; padding: 16px 18px; background: #faf9f6\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;color:#1f3a5f;text-transform:uppercase;font-weight:600;margin-bottom:6px;\">TEKLİF BİLGİLERİ<\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #ece9e2;\">\n            <span style=\"font-size:12px;color:#7a766e;\">Teklif Tarihi<\u002Fspan>\n            <input class=\"edit\" data-mfield=\"tarih\" value=\"{{ meta.tarih }}\" oninput=\"{{ onMeta }}\" inputmode=\"numeric\" placeholder=\"GG.AA.YYYY\" style=\"max-width:58%;text-align:right;font-size:13px;font-weight:500;\">\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #ece9e2;\">\n            <span style=\"font-size:12px;color:#7a766e;\">Teklif No<\u002Fspan>\n            <input class=\"edit num\" data-mfield=\"no\" value=\"{{ meta.no }}\" oninput=\"{{ onMeta }}\" style=\"max-width:58%;font-size:13px;font-weight:500;\">\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;\">\n            <span style=\"font-size:12px;color:#7a766e;\">Geçerlilik Tarihi<\u002Fspan>\n            <input class=\"edit\" data-mfield=\"gecerli\" value=\"{{ meta.gecerli }}\" oninput=\"{{ onMeta }}\" inputmode=\"numeric\" placeholder=\"GG.AA.YYYY\" style=\"max-width:58%;text-align:right;font-size:13px;font-weight:500;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #e6e2da;border-radius:7px;padding:16px 18px;background:#faf9f6;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;color:#1f3a5f;text-transform:uppercase;font-weight:600;margin-bottom:6px;\">MÜŞTERİ BİLGİLERİ<\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #ece9e2;\">\n            <span style=\"font-size:12px;color:#7a766e;white-space:nowrap;\">Firma<\u002Fspan>\n            <input class=\"edit\" data-mfield=\"firma\" value=\"{{ meta.firma }}\" oninput=\"{{ onMeta }}\" style=\"max-width:64%;text-align:right;font-size:13px;font-weight:500;\" placeholder=\"Firma adı\">\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #ece9e2;\">\n            <span style=\"font-size:12px;color:#7a766e;white-space:nowrap;\">Yetkili (Muhatap)<\u002Fspan>\n            <input class=\"edit\" data-mfield=\"yetkili\" value=\"{{ meta.yetkili }}\" oninput=\"{{ onMeta }}\" style=\"max-width:58%;text-align:right;font-size:13px;font-weight:500;\" placeholder=\"Ad Soyad\">\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;\">\n            <span style=\"font-size:12px;color:#7a766e;white-space:nowrap;\">Telefon<\u002Fspan>\n            <input class=\"edit\" data-mfield=\"tel\" value=\"{{ meta.tel }}\" oninput=\"{{ onMeta }}\" inputmode=\"tel\" style=\"max-width:58%;text-align:right;font-size:13px;font-weight:500;\" placeholder=\"0 5__ ___ __ __\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mid\" style=\"flex:1;display:flex;flex-direction:column;justify-content:center;\">\n      <!-- TABLE -->\n      <div style=\"margin-top:0;\">\n        <div class=\"grow\" style=\"display:grid;grid-template-columns:1fr 64px 84px 116px 128px 26px;border-bottom:2px solid #1f3a5f;padding-bottom:10px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#7a766e;text-transform:uppercase;font-weight:600;padding:0 6px;text-align:left;letter-spacing:.14em;\">Açıklama<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#7a766e;text-transform:uppercase;font-weight:600;padding:0 6px;text-align:center;\">BİRİM<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#7a766e;text-transform:uppercase;font-weight:600;padding:0 6px;text-align:right;\">MİKTAR<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#7a766e;text-transform:uppercase;font-weight:600;padding:0 6px;text-align:right;\">BİRİM FİYAT<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#7a766e;text-transform:uppercase;font-weight:600;padding:0 6px;text-align:right;\">Toplam<\u002Fdiv>\n          <div class=\"no-print\"><\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"5\">\n          <div class=\"grow\" style=\"display:grid;grid-template-columns:1fr 64px 84px 116px 128px 26px;align-items:center;border-bottom:1px solid #ece9e2;\">\n            <div style=\"padding:4px 2px;\">\n              <input class=\"edit\" data-id=\"{{ row.id }}\" data-field=\"desc\" value=\"{{ row.desc }}\" oninput=\"{{ onCell }}\" style=\"font-size:13px;color:#191815;\" placeholder=\"Kalem açıklaması\">\n            <\u002Fdiv>\n            <div style=\"padding:4px 2px;\">\n              <input class=\"edit\" data-id=\"{{ row.id }}\" data-field=\"unit\" value=\"{{ row.unit }}\" oninput=\"{{ onCell }}\" style=\"font-size:13px;text-align:center;color:#5a5750;\">\n            <\u002Fdiv>\n            <div style=\"padding:4px 2px;\">\n              <input class=\"edit num\" data-id=\"{{ row.id }}\" data-field=\"qty\" value=\"{{ row.qty }}\" oninput=\"{{ onCell }}\" style=\"font-size:13px;color:#191815;\">\n            <\u002Fdiv>\n            <div style=\"padding:4px 2px;\">\n              <input class=\"edit num\" data-id=\"{{ row.id }}\" data-field=\"price\" value=\"{{ row.price }}\" oninput=\"{{ onCell }}\" style=\"font-size:13px;color:#191815;\">\n            <\u002Fdiv>\n            <div style=\"text-align:right;padding:8px 6px;font-family:'IBM Plex Mono',monospace;font-weight:600;color:#191815;font-size:13px;white-space:nowrap;\">{{ row.totalStr }} ₺<\u002Fdiv>\n            <div class=\"no-print\" style=\"text-align:center;\">\n              <button onclick=\"{{ removeRow }}\" data-id=\"{{ row.id }}\" style=\"border:none;background:transparent;color:#c5c0b7;cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;\">×<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <button class=\"no-print\" onclick=\"{{ addRow }}\" style=\"margin-top:12px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;color:#1f3a5f;background:transparent;border:1px dashed #c7cdd6;border-radius:6px;padding:7px 14px;cursor:pointer;\">+ Satır ekle<\u002Fbutton>\n\n      <!-- TOTALS -->\n      <div style=\"display:flex;justify-content:flex-end;margin-top:22px;\">\n        <div class=\"totbox\" style=\"width:330px;border:1px solid #e6e2da;border-radius:7px;overflow:hidden;\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #ece9e2;\">\n            <span style=\"font-size:12px;color:#7a766e;\">Toplam<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:#191815;white-space:nowrap;\">{{ subtotalStr }} ₺<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #ece9e2;\">\n            <span style=\"font-size:12px;color:#7a766e;\">KDV (%{{ kdvRateStr }})<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:#191815;white-space:nowrap;\">{{ kdvStr }} ₺<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-bottom:1px solid #ece9e2;\">\n            <span style=\"font-size:12px;color:#7a766e;\">İndirim<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:2px;color:#c2552e;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;\">−<input class=\"edit num\" value=\"{{ indirim }}\" oninput=\"{{ onIndirim }}\" style=\"width:96px;color:#c2552e;font-weight:600;\"> ₺<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#1f3a5f;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;color:#c6d0de;text-transform:uppercase;\">Genel Toplam<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:700;color:#fff;white-space:nowrap;\">{{ genelStr }} ₺<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- /MIDDLE -->\n\n      <!-- BOTTOM: CONTACT + FOOTER -->\n      <div>\n        <div class=\"botrow\" style=\"display:flex;justify-content:space-between;gap:36px;align-items:flex-end;\">\n          <div style=\"border-left:3px solid #1f3a5f;padding-left:15px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;color:#7a766e;text-transform:uppercase;margin-bottom:6px;\">İLETİŞİM<\u002Fdiv>\n            <div style=\"font-size:16px;font-weight:700;color:#191815;letter-spacing:.01em;\">Ahmet GÖÇER<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;color:#1f3a5f;font-weight:500;margin-top:3px;letter-spacing:.02em;\">0 531 540 22 22<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"note\" style=\"font-size:11px;line-height:1.6;color:#9a958c;max-width:320px;text-align:right;\">\n            Teklifimiz, yukarıda belirtilen geçerlilik tarihine kadar geçerlidir. İş öncesi keşif ve renk seçimi tarafımızca ücretsiz yapılmaktadır.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px;border-top:1px solid #e6e2da;padding-top:12px;display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.05em;color:#a8a399;text-transform:uppercase;\">\n          <span>SELÇUKLU GÖÇER BOYA — FİYAT TEKLİF FORMU<\u002Fspan>\n          <span>TEŞEKKÜR EDERİZ<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:794,&quot;height&quot;:1123},&quot;kdvRate&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:20,&quot;min&quot;:0,&quot;max&quot;:100,&quot;tsType&quot;:&quot;number&quot;},&quot;showSwatches&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    rows: [\n      { id: 'r1', desc: 'İç cephe boyası — Silikonlu mat (3 kat)', unit: 'm²', qty: '320', price: '85,00' },\n      { id: 'r2', desc: 'Dış cephe boyası — Akrilik esaslı', unit: 'm²', qty: '180', price: '145,00' },\n      { id: 'r3', desc: 'Astar uygulaması (iç/dış cephe)', unit: 'm²', qty: '500', price: '35,00' },\n      { id: 'r4', desc: 'Alçı tamir, macun ve zımpara', unit: 'm²', qty: '220', price: '28,00' },\n      { id: 'r5', desc: 'Boya işçiliği (usta + yardımcı)', unit: 'gün', qty: '12', price: '1.500,00' }\n    ],\n    indirim: '2.500,00',\n    meta: { tarih: '24.06.2026', no: '2026-0147', gecerli: '09.07.2026', firma: '', yetkili: '', tel: '' }\n  };\n\n  fmtDate = (val) => {\n    const d = String(val).replace(/\\D/g, '').slice(0, 8);\n    let r = d.slice(0, 2);\n    if (d.length > 2) r += '.' + d.slice(2, 4);\n    if (d.length > 4) r += '.' + d.slice(4, 8);\n    return r;\n  };\n\n  fmtPhone = (val) => {\n    let d = String(val).replace(/\\D/g, '');\n    if (d && d[0] !== '0') d = '0' + d;\n    d = d.slice(0, 11);\n    if (!d) return '';\n    let r = d.slice(0, 1);\n    if (d.length > 1) r += ' ' + d.slice(1, 4);\n    if (d.length > 4) r += ' ' + d.slice(4, 7);\n    if (d.length > 7) r += ' ' + d.slice(7, 9);\n    if (d.length > 9) r += ' ' + d.slice(9, 11);\n    return r;\n  };\n\n  onMeta = (e) => {\n    const f = e.target.dataset.mfield;\n    let v = e.target.value;\n    if (f === 'tarih' || f === 'gecerli') v = this.fmtDate(v);\n    else if (f === 'tel') v = this.fmtPhone(v);\n    this.setState(s => ({ meta: { ...s.meta, [f]: v } }));\n  };\n\n  parse = (s) => {\n    if (typeof s === 'number') return s;\n    if (!s) return 0;\n    const n = parseFloat(String(s).trim().replace(/\\./g, '').replace(',', '.'));\n    return isNaN(n) ? 0 : n;\n  };\n\n  fmt = (n) => new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n || 0);\n\n  onCell = (e) => {\n    const id = e.target.dataset.id;\n    const f = e.target.dataset.field;\n    const v = e.target.value;\n    this.setState(s => ({ rows: s.rows.map(r => String(r.id) === String(id) ? { ...r, [f]: v } : r) }));\n  };\n\n  onIndirim = (e) => {\n    const v = e.target.value;\n    this.setState({ indirim: v });\n  };\n\n  addRow = () => this.setState(s => ({ rows: [...s.rows, { id: 'r' + Date.now(), desc: '', unit: 'm²', qty: '', price: '' }] }));\n\n  removeRow = (e) => {\n    const id = e.currentTarget.dataset.id;\n    this.setState(s => ({ rows: s.rows.filter(r => String(r.id) !== String(id)) }));\n  };\n\n  printDoc = () => { window.print(); };\n\n  renderVals() {\n    const rate = Number(this.props.kdvRate ?? 20);\n    const parse = this.parse, fmt = this.fmt;\n    const rows = this.state.rows.map(r => ({ ...r, totalStr: fmt(parse(r.qty) * parse(r.price)) }));\n    const subtotal = this.state.rows.reduce((a, r) => a + parse(r.qty) * parse(r.price), 0);\n    const kdv = subtotal * rate / 100;\n    const indirimNum = parse(this.state.indirim);\n    const genel = subtotal + kdv - indirimNum;\n    return {\n      rows,\n      subtotalStr: fmt(subtotal),\n      kdvStr: fmt(kdv),\n      genelStr: fmt(genel),\n      indirim: this.state.indirim,\n      meta: this.state.meta,\n      onMeta: this.onMeta,\n      kdvRateStr: String(rate),\n      showSwatches: (this.props.showSwatches ?? true),\n      onCell: this.onCell,\n      onIndirim: this.onIndirim,\n      addRow: this.addRow,\n      removeRow: this.removeRow,\n      printDoc: this.printDoc\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
